server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;
    }

    location ~ /\.(env|git) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(sql|bak|backup|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /(storage/logs|bootstrap/cache)/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(?:composer\.(?:json|lock)|package(?:-lock)?\.json|vite\.config\.js|tailwind\.config\.js|phpunit\.xml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
