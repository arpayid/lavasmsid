services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env.docker.example
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      REDIS_HOST: redis
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lavasmsid

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - vendor_data:/var/www/html/vendor:ro
      - node_modules_data:/var/www/html/node_modules:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - lavasmsid

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-33066}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-lavasmsid}
      MYSQL_USER: ${DB_USERNAME:-lavasmsid}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lavasmsid

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lavasmsid

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - .env.docker.example
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      REDIS_HOST: redis
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - lavasmsid

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    env_file:
      - .env.docker.example
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - lavasmsid

volumes:
  mysql_data:
  redis_data:
  vendor_data:
  node_modules_data:

networks:
  lavasmsid:
    driver: bridge
