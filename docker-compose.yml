services:
  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: lavasmsid-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lavasmsid
      DB_USERNAME: lavasmsid
      DB_PASSWORD: lavasmsid
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - lavasmsid

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: lavasmsid-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - lavasmsid

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: lavasmsid-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: lavasmsid
      MYSQL_USER: lavasmsid
      MYSQL_PASSWORD: lavasmsid
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lavasmsid

  # Redis Cache & Session
  redis:
    image: redis:alpine
    container_name: lavasmsid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lavasmsid

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: lavasmsid-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lavasmsid
      DB_USERNAME: lavasmsid
      DB_PASSWORD: lavasmsid
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - db
      - redis
    networks:
      - lavasmsid

  # Laravel Scheduler
  scheduler:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: lavasmsid-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:run
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lavasmsid
      DB_USERNAME: lavasmsid
      DB_PASSWORD: lavasmsid
    depends_on:
      - app
      - db
    networks:
      - lavasmsid

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  lavasmsid:
    driver: bridge
