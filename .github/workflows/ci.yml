name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ── Laravel Foundation Test ──
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, pdo_sqlite, zip, intl, bcmath, gd, pcntl, fileinfo
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-req=php

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Configure SQLite database
        run: |
          touch database/database.sqlite
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's#DB_DATABASE=.*#DB_DATABASE=database/database.sqlite#' .env
          sed -i 's/SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env
          sed -i 's/CACHE_STORE=.*/CACHE_STORE=array/' .env
          sed -i 's/QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env

      - name: Clear config cache
        run: php artisan config:clear

      - name: Check routes
        run: php artisan route:list

      - name: Run migrations and seeders
        run: php artisan migrate:fresh --seed --force

      - name: Install NPM dependencies
        run: npm install

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: php artisan test

  # ── Code Style Report ──
  lint:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, zip, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-req=php

      - name: Run Pint report without blocking CI
        run: ./vendor/bin/pint --test || true

  # ── Docker Build Test ──
  docker:
    runs-on: ubuntu-latest
    needs: tests
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build app
